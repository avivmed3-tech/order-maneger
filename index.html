        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><div style={{fontWeight:700,fontSize:14}}>📦 כמויות שסופקו</div><div style={{fontSize:12,color:"#94a3b8"}}>סה"כ: <b style={{color:"#3b82f6"}}>{pKeys.reduce((s,k)=>s+pd[k].qty,0).toLocaleString()}</b></div></div>
        <BarChart data={pKeys.map(k=>({label:k,value:pd[k].qty}))} color="#3b82f6" formatVal={v=>v.toLocaleString()} height={100}/>
      </Card>
      <Card style={{marginBottom:12}}>
        <div style={{fontWeight:700,marginBottom:14,fontSize:14}}>🏗️ התקדמות לפי פרויקט</div>
        {pStats.filter(p=>p.qty>0).length===0?<div style={{color:"#64748b",textAlign:"center",padding:"20px 0"}}>אין נתונים</div>:(
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(240px,1fr))",gap:12}}>
            {pStats.filter(p=>p.qty>0).map((p,i)=>{const pct=p.qty?Math.min(100,Math.round(p.sup/p.qty*100)):0,c=COLORS[i%COLORS.length];return(
              <div key={p.id} style={{background:"var(--c-deep)",borderRadius:10,padding:"12px 14px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><div style={{display:"flex",alignItems:"center",gap:7}}><div style={{width:9,height:9,borderRadius:2,background:c}}/><span style={{fontWeight:600,fontSize:13}}>{p.name}</span></div><span style={{fontSize:14,fontWeight:800,color:c}}>{pct}%</span></div>
                <div style={{height:7,background:"var(--c-border)",borderRadius:4,overflow:"hidden",marginBottom:6}}><div style={{width:pct+"%",height:"100%",background:`linear-gradient(90deg,${c}66,${c})`,borderRadius:4,transition:"width .6s"}}/></div>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#64748b"}}><span>{p.sup.toLocaleString()} / {p.qty.toLocaleString()} יח'</span><span style={{color:"#a78bfa",fontWeight:600}}>{fmtMoney(p.rev)}</span></div>
              </div>
            )})}
          </div>
        )}
      </Card>
      {(overdue.length>0||blocked.length>0)&&(
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:12}}>
          {overdue.length>0&&<Card style={{border:"1px solid #ef444433"}}><div style={{fontWeight:700,marginBottom:8,fontSize:13,color:"#ef4444"}}>🚨 עברו יעד אספקה</div><div style={{display:"flex",flexDirection:"column",gap:5}}>{overdue.map(o=><div key={o.id} style={{background:"var(--c-deep)",borderRadius:7,padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><span style={{fontWeight:700,color:"#f97316",fontSize:13}}>{o.woNumber}</span><span style={{color:"#94a3b8",marginRight:8,fontSize:12}}>{o.description}</span></div><span style={{fontSize:12,color:"#ef4444",background:"#450a0a",padding:"2px 8px",borderRadius:10,whiteSpace:"nowrap"}}>+{o.dl} ימים</span></div>)}</div></Card>}
          {blocked.length>0&&<Card style={{border:"1px solid #f9731633"}}><div style={{fontWeight:700,marginBottom:8,fontSize:13,color:"#f97316"}}>🚧 תקועות בחוסרים</div><div style={{display:"flex",flexDirection:"column",gap:5}}>{blocked.slice(0,5).map(o=>{const c=(o.shortages||[]).filter(s=>!s.received).length;return<div key={o.id} style={{background:"var(--c-deep)",borderRadius:7,padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><span style={{fontWeight:700,color:"#f97316",fontSize:13}}>{o.woNumber}</span><span style={{color:"#94a3b8",marginRight:8,fontSize:12}}>{o.description}</span></div><span style={{fontSize:12,color:"#ef4444"}}>{c} חוסר{c>1?"ים":""}</span></div>})}</div></Card>}
        </div>
      )}
    </div>
  );
}

// ── Yield Dashboard ────────────────────────────────────────────────────────────
function YieldDashboard({orders,projects}){
  const [filterProj,setFilterProj]=useState("all");
  const [filterWO,setFilterWO]=useState("all");
  const [period,setPeriod]=useState("month");

  // All orders with defects data
  const base=useMemo(()=>orders.filter(o=>
    (filterProj==="all"||o.projectId===filterProj)&&
    (filterWO==="all"||o.id===filterWO)
  ),[orders,filterProj,filterWO]);

  // Yield per order: simple = 1 - (total_defects / delivered_qty)
  // ALL defects count (open + closed), no severity weighting
  const orderYields=useMemo(()=>base.map(o=>{
    const delivered=o.deliveries.reduce((a,d)=>a+Number(d.qty||0),0);
    const totalDef=(o.defects||[]).length;
    const openDef=(o.defects||[]).filter(d=>d.status!=="closed").length;
    const closedDef=(o.defects||[]).filter(d=>d.status==="closed").length;
    const critHigh=(o.defects||[]).filter(d=>["critical","high"].includes(d.severity)).length;
    const proj=projects.find(p=>p.id===o.projectId);
    // Yield = (delivered - totalDef) / delivered * 100
    // defect rate = totalDef / delivered * 100
    const defectRate=delivered>0?(totalDef/delivered)*100:null;
    const yieldPct=defectRate!==null?Math.max(0,Math.min(100,100-defectRate)):null;
    return{...o,delivered,totalDef,openDef,closedDef,critHigh,yieldPct,defectRate,proj,
      yieldColor:yieldPct===null?"#64748b":yieldPct>=95?"#10b981":yieldPct>=85?"#3b82f6":yieldPct>=70?"#f59e0b":"#ef4444"
    };
  }).filter(o=>o.delivered>0||o.totalDef>0),[base]);

  // Yield over time (by period) — ALL defects, no severity weight
  const timeData=useMemo(()=>{
    const keyFn=d=>period==="month"?mkKey(d):period==="quarter"?qKey(d):yrKey(d);
    const buckets={};
    base.forEach(o=>{
      o.deliveries.forEach(d=>{
        const k=keyFn(d.date);
        if(!k)return;
        if(!buckets[k])buckets[k]={delivered:0,defects:0};
        buckets[k].delivered+=Number(d.qty||0);
      });
      // ALL defects (open + closed), attributed to discovery date
      (o.defects||[]).forEach(df=>{
        const k=keyFn(df.discoveredDate||"");
        if(!k)return;
        if(!buckets[k])buckets[k]={delivered:0,defects:0};
        buckets[k].defects++;
      });
    });
    return Object.keys(buckets).sort().slice(-12).map(k=>{
      const b=buckets[k];
      const y=b.delivered>0?Math.max(0,Math.min(100,100-(b.defects/b.delivered*100))):null;
      return{label:k,yield:y,delivered:b.delivered,defects:b.defects};
    });
  },[base,period]);

  // KPIs
  const totalDelivered=orderYields.reduce((s,o)=>s+o.delivered,0);
  const totalAllDef=orderYields.reduce((s,o)=>s+o.totalDef,0);
  const totalCritHigh=orderYields.reduce((s,o)=>s+o.critHigh,0);
  const ordersWithYield=orderYields.filter(o=>o.yieldPct!==null);
  const avgYield=ordersWithYield.length?Math.round(ordersWithYield.reduce((s,o)=>s+o.yieldPct,0)/ordersWithYield.length*10)/10:null;
  const worstOrders=[...orderYields].filter(o=>o.yieldPct!==null).sort((a,b)=>a.yieldPct-b.yieldPct).slice(0,5);
  const bestOrders=[...orderYields].filter(o=>o.yieldPct!==null&&o.yieldPct>=95).length;

  const cv=useCssVars();
  const yieldColor=y=>y===null?"#64748b":y>=95?"#10b981":y>=85?"#3b82f6":y>=70?"#f59e0b":"#ef4444";
  const yieldLabel=y=>y===null?"—":y>=95?"מצוין":y>=85?"טוב":y>=70?"בינוני":"נמוך";

  // Bar chart for yield over time
  const YieldTimeChart=({data,height=130})=>{
    const [hov,setHov]=useState(null);
    if(!data||!data.length||data.every(d=>d.yield===null))
      return<div style={{height,display:"flex",alignItems:"center",justifyContent:"center",color:"var(--c-dim)",fontSize:13}}>אין נתוני Yield לתקופה זו</div>;
    const valid=data.filter(d=>d.yield!==null);
    const padL=36,padR=16,padT=52,padB=44,W=480,H=height+padT+padB;
    const slotW=(W-padL-padR)/data.length;
    const bw=Math.min(40,slotW*.55);
    const bx=i=>padL+i*slotW+slotW/2-bw/2;
    const bh=v=>Math.max((v/100)*height,2);
    const by=v=>padT+height-bh(v);
    const MN=["","ינו","פבר","מרץ","אפר","מאי","יונ","יול","אוג","ספט","אוק","נוב","דצמ"];
    const fmtL=l=>{if(/^\d{4}-\d{2}$/.test(l)){const[y,m]=l.split("-");return MN[+m]+"'"+y.slice(2)}if(/^\d{4}-Q\d/.test(l)){const p=l.split("-");return p[1]+"'"+p[0].slice(2)}return l};
    // Reference lines at 95% and 85%
    const refLines=[{v:95,c:"#10b981",l:"95%"},{v:85,c:"#f59e0b",l:"85%"}];
    return(
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto",display:"block"}}>
        {/* Grid lines */}
        {[0,25,50,75,100].map(v=>{const y=padT+height-(v/100)*height;return(
          <g key={v}><line x1={padL} y1={y} x2={W-padR} y2={y} stroke={v===0?cv.grid:cv.grid2} strokeWidth={v===0?1.5:1} strokeDasharray={v===0?"":"3 3"}/>
          <text x={padL-6} y={y+4} textAnchor="end" fill={cv.label} fontSize={10} fontFamily="sans-serif">{v}%</text></g>
        )})}
        {/* Reference lines */}
        {refLines.map(({v,c,l})=>{const y=padT+height-(v/100)*height;return(
          <g key={v}>
            <line x1={padL} y1={y} x2={W-padR} y2={y} stroke={c} strokeWidth={1.5} strokeDasharray="6 3" opacity={0.6}/>
            <text x={W-padR+2} y={y+4} fill={c} fontSize={9} fontFamily="sans-serif">{l}</text>
          </g>
        )})}
        {/* Bars */}
        {data.map((d,i)=>{
          if(d.yield===null)return null;
          const x=bx(i),h=bh(d.yield),y=by(d.yield),isH=hov===i,cx2=x+bw/2;
          const c=yieldColor(d.yield);
          return(
            <g key={i} onMouseEnter={()=>setHov(i)} onMouseLeave={()=>setHov(null)} style={{cursor:"pointer"}}>
              {isH&&<rect x={x-3} y={y-3} width={bw+6} height={h+3} rx={5} fill={c} opacity={0.15}/>}
              <rect x={x} y={y} width={bw} height={h} rx={4} fill={isH?c:c+"cc"}/>
              <rect x={x} y={y} width={bw} height={Math.min(5,h)} rx={4} fill="rgba(255,255,255,.2)"/>
              {isH&&<g>
                {(()=>{
                  const tw=96,th=36;
                  const tx=Math.min(Math.max(cx2-tw/2, padL), W-padR-tw);
                  // Always show above the bar — padT is 52 so there's always room
                  const ty=Math.max(padT+2, y-th-8);
                  return(<g>
                    <rect x={tx} y={ty} width={tw} height={th} rx={5} fill={cv.tooltip} stroke={c} strokeWidth={1.2}/>
                    <text x={tx+tw/2} y={ty+14} textAnchor="middle" fill={c} fontSize={12} fontWeight="700" fontFamily="sans-serif">{d.yield.toFixed(1)}%</text>
                    <text x={tx+tw/2} y={ty+27} textAnchor="middle" fill={cv.muted} fontSize={9} fontFamily="sans-serif">{d.defects} תקלות · {d.delivered.toLocaleString()} יח'</text>
                  </g>);
                })()}
              </g>}
            </g>
          );
        })}
        <line x1={padL} y1={padT+height} x2={W-padR} y2={padT+height} stroke={cv.grid} strokeWidth={1.5}/>
        {data.map((d,i)=><text key={i} x={bx(i)+bw/2} y={padT+height+20} textAnchor="middle" fill={cv.axis} fontSize={11} fontWeight="600" fontFamily="sans-serif">{fmtL(d.label)}</text>)}
      </svg>
    );
  };

  return(
    <div>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:10}}>
        <div>
          <h2 style={{margin:"0 0 3px",fontSize:22,color:"#10b981"}}>📉 דשבורד Yield ייצור</h2>
          <div style={{fontSize:12,color:"var(--c-muted)"}}>אחוז התפוקה האיכותית — מחושב לפי אספקות ומשקל תקלות פתוחות</div>
        </div>
        {avgYield!==null&&(
          <div style={{background:yieldColor(avgYield)+"22",border:`2px solid ${yieldColor(avgYield)}`,borderRadius:12,padding:"8px 18px",textAlign:"center"}}>
            <div style={{fontSize:11,color:"var(--c-muted)"}}>Yield ממוצע</div>
            <div style={{fontSize:28,fontWeight:800,color:yieldColor(avgYield),lineHeight:1.1}}>{avgYield.toFixed(1)}%</div>
            <div style={{fontSize:11,color:yieldColor(avgYield),fontWeight:600}}>{yieldLabel(avgYield)}</div>
          </div>
        )}
      </div>

      {/* Filters */}
      <div style={{position:"sticky",top:52,zIndex:40,background:"var(--c-bg)",paddingTop:6,paddingBottom:4,marginBottom:12}} className="dash-filter-sticky">
        <Card style={{padding:"10px 14px",display:"flex",gap:12,flexWrap:"wrap",alignItems:"flex-end",boxShadow:"0 2px 8px #0003"}}>
          <div style={{display:"flex",flexDirection:"column",gap:3,minWidth:150}}>
            <label style={{fontSize:11,color:"var(--c-dim)"}}>פרויקט</label>
            <select value={filterProj} onChange={e=>{setFilterProj(e.target.value);setFilterWO("all")}} style={{padding:"5px 8px",fontSize:12}}>
              <option value="all">כל הפרויקטים</option>
              {projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
            </select>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:3,minWidth:180}}>
            <label style={{fontSize:11,color:"var(--c-dim)"}}>פק"ע ספציפית</label>
            <select value={filterWO} onChange={e=>setFilterWO(e.target.value)} style={{padding:"5px 8px",fontSize:12}}>
              <option value="all">כל הפקעות</option>
              {orders.filter(o=>filterProj==="all"||o.projectId===filterProj).map(o=><option key={o.id} value={o.id}>{o.woNumber} — {o.description?.slice(0,25)||""}</option>)}
            </select>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:3}}>
            <label style={{fontSize:11,color:"var(--c-dim)"}}>תקופה בגרף</label>
            <SegBtn options={[["month","חודשי"],["quarter","רבעוני"],["year","שנתי"]]} value={period} onChange={setPeriod}/>
          </div>
          {(filterProj!=="all"||filterWO!=="all")&&<button onClick={()=>{setFilterProj("all");setFilterWO("all")}} style={{background:"#374151",color:"#e2e8f0",border:"none",borderRadius:6,padding:"5px 10px",fontSize:12,fontFamily:"inherit"}}>✕ נקה</button>}
        </Card>
      </div>

      {/* KPIs */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:9,marginBottom:14}}>
        <KpiBox i="📉" v={avgYield!==null?avgYield.toFixed(1)+"%":"—"} label="Yield ממוצע" c={yieldColor(avgYield)}/>
        <KpiBox i="✅" v={bestOrders} label='פקעות ≥95% Yield' c="#10b981"/>
        <KpiBox i="🔧" v={totalAllDef} label="סה״כ תקלות" c="#ef4444"/>
        <KpiBox i="🔴" v={totalCritHigh} label="קריטיות+גבוהות" c="#dc2626"/>
        <KpiBox i="📦" v={totalDelivered.toLocaleString()} label='יח׳ שסופקו' c="#3b82f6"/>
        <KpiBox i="🏭" v={orderYields.length} label='פקעות פעילות' c="#a78bfa"/>
      </div>

      {/* Yield over time */}
      <Card style={{marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
          <div style={{fontWeight:700,fontSize:15}}>📈 Yield לאורך זמן</div>
          <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
            {[{c:"#10b981",l:"≥95% מצוין"},{c:"#3b82f6",l:"85-95% טוב"},{c:"#f59e0b",l:"70-85% בינוני"},{c:"#ef4444",l:"<70% נמוך"}].map(({c,l})=>(
              <div key={l} style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:10,height:10,borderRadius:2,background:c}}/><span style={{fontSize:11,color:"var(--c-muted)"}}>{l}</span></div>
            ))}
          </div>
        </div>
        <YieldTimeChart data={timeData} height={140}/>
      </Card>

      {/* Yield per order table */}
      <Card style={{marginBottom:14}}>
        <div style={{fontWeight:700,fontSize:15,marginBottom:12}}>🏭 Yield לפי פקודת עבודה</div>
        {orderYields.length===0?<div style={{textAlign:"center",padding:30,color:"var(--c-dim)"}}>אין נתונים — ייבא אספקות או תקלות</div>:(
          <div style={{overflowX:"auto"}}>
            <table>
              <thead><tr>
                <th>פק"ע</th><th>תיאור</th><th>פרויקט</th><th>סופק</th><th>תקלות (סה"כ)</th><th>קריטי/גבוה</th>
                <th style={{minWidth:120}}>Yield</th><th>דירוג</th>
              </tr></thead>
              <tbody>{[...orderYields].sort((a,b)=>(a.yieldPct??999)-(b.yieldPct??999)).map(o=>(
                <tr key={o.id}>
                  <td style={{fontWeight:700,color:"#60a5fa",whiteSpace:"nowrap"}}>{o.woNumber}</td>
                  <td style={{color:"var(--c-muted)",fontSize:12,maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{o.description||"—"}</td>
                  <td style={{fontSize:12,color:"#93c5fd",whiteSpace:"nowrap"}}>{o.proj?.name||"—"}</td>
                  <td style={{color:"#10b981",fontWeight:600,textAlign:"center"}}>{o.delivered.toLocaleString()}</td>
                  <td style={{color:o.totalDef>0?"#ef4444":"var(--c-dim)",fontWeight:600,textAlign:"center"}}>{o.totalDef}</td>
                  <td style={{color:o.critHigh>0?"#dc2626":"var(--c-dim)",fontWeight:700,textAlign:"center"}}>{o.critHigh}</td>
                  <td>
                    {o.yieldPct!==null?(
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={{flex:1,height:8,background:"var(--c-border)",borderRadius:4,overflow:"hidden",minWidth:60}}>
                          <div style={{width:o.yieldPct+"%",height:"100%",background:yieldColor(o.yieldPct),borderRadius:4,transition:"width .5s"}}/>
                        </div>
                        <span style={{fontWeight:700,color:yieldColor(o.yieldPct),minWidth:44,textAlign:"left"}}>{o.yieldPct.toFixed(1)}%</span>
                      </div>
                    ):<span style={{color:"var(--c-dim)",fontSize:12}}>אין אספקות</span>}
                  </td>
                  <td style={{textAlign:"center"}}>
                    <span style={{background:yieldColor(o.yieldPct)+"22",color:yieldColor(o.yieldPct),padding:"2px 8px",borderRadius:12,fontSize:11,fontWeight:600,whiteSpace:"nowrap"}}>{yieldLabel(o.yieldPct)}</span>
                  </td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        )}
      </Card>

      {/* Worst performers */}
      {worstOrders.length>0&&(
        <Card style={{border:"1px solid #ef444433"}}>
          <div style={{fontWeight:700,fontSize:15,color:"#ef4444",marginBottom:12}}>🚨 פקעות עם Yield נמוך ביותר</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {worstOrders.map((o,i)=>(
              <div key={o.id} style={{background:"var(--c-deep)",borderRadius:9,padding:"12px 14px",border:`1px solid ${yieldColor(o.yieldPct)}33`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
                  <div>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
                      <span style={{fontWeight:700,color:"#60a5fa"}}>{o.woNumber}</span>
                      {o.proj&&<span style={{fontSize:11,background:"var(--c-tag-blue-bg)",color:"var(--c-tag-blue)",padding:"2px 7px",borderRadius:20}}>{o.proj.name}</span>}
                      <span style={{fontSize:11,background:yieldColor(o.yieldPct)+"22",color:yieldColor(o.yieldPct),padding:"2px 8px",borderRadius:12,fontWeight:600}}>Yield {o.yieldPct.toFixed(1)}%</span>
                    </div>
                    {o.description&&<div style={{fontSize:12,color:"var(--c-muted)",marginBottom:4}}>{o.description}</div>}
                    <div style={{fontSize:11,color:"var(--c-dim)",display:"flex",gap:12,flexWrap:"wrap"}}>
                      <span>סופק: <b style={{color:"var(--c-text)"}}>{o.delivered.toLocaleString()} יח'</b></span>
                      <span>סה"כ תקלות: <b style={{color:"#ef4444"}}>{o.totalDef}</b></span>
                      {o.critHigh>0&&<span>קריטי/גבוה: <b style={{color:"#dc2626"}}>{o.critHigh}</b></span>}
                    </div>
                  </div>
                  <div style={{textAlign:"center",minWidth:60}}>
                    <div style={{fontSize:28,fontWeight:800,color:yieldColor(o.yieldPct),lineHeight:1}}>{o.yieldPct.toFixed(0)}%</div>
                    <div style={{fontSize:10,color:"var(--c-dim)"}}>מקום #{i+1}</div>
                  </div>
                </div>
                {/* Defects breakdown */}
                {o.allDef>0&&(
                  <div style={{marginTop:8,display:"flex",gap:6,flexWrap:"wrap"}}>
                    {["critical","high","medium","low"].map(sev=>{
                      const sevLabel={critical:"🔴 קריטית",high:"🟠 גבוהה",medium:"🟡 בינונית",low:"🟢 נמוכה"};
                      const sevColor={critical:"#dc2626",high:"#f97316",medium:"#f59e0b",low:"#10b981"};
                      const cnt=(o.defects||[]).filter(d=>d.severity===sev&&d.status!=="closed").length;
                      if(!cnt)return null;
                      return<span key={sev} style={{fontSize:11,background:sevColor[sev]+"22",color:sevColor[sev],padding:"2px 8px",borderRadius:12,border:`1px solid ${sevColor[sev]}44`}}>{sevLabel[sev]}: {cnt}</span>;
                    })}
                  </div>
                )}
              </div>
            ))}
          </div>
        </Card>
      )}
    </div>
  );
}

function OrderForm({initial,projects,onSave,onClose}){
  const [f,setF]=useState({woNumber:initial?.woNumber||"",description:initial?.description||"",qty:initial?.qty||"",unitPrice:initial?.unitPrice||"",projectId:initial?.projectId||"",receivedDate:initial?.receivedDate||todays(),targetDate:initial?.targetDate||""});
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  return(
    <div>
      <h3 style={{margin:"0 0 16px",fontSize:18}}>{initial?'עריכת פק"ע':'פק"ע חדשה'}</h3>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(190px,1fr))",gap:12}}>
        <Field label='מספר פק"ע *' value={f.woNumber} onChange={v=>s("woNumber",v)}/>
        <Field label="תיאור" value={f.description} onChange={v=>s("description",v)}/>
        <Field label="כמות *" type="number" value={f.qty} onChange={v=>s("qty",v)}/>
        <Field label="מחיר ליחידה (₪)" type="number" value={f.unitPrice} onChange={v=>s("unitPrice",v)}/>
        <div style={{display:"flex",flexDirection:"column",gap:4}}><label style={{fontSize:12,color:"var(--c-dim)",fontWeight:600}}>פרויקט</label><select value={f.projectId} onChange={e=>s("projectId",e.target.value)}><option value="">-- בחר פרויקט --</option>{projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select></div>
        <Field label="תאריך קבלה" type="date" value={f.receivedDate} onChange={v=>s("receivedDate",v)}/>
        <Field label="יעד אספקה" type="date" value={f.targetDate} onChange={v=>s("targetDate",v)}/>
      </div>
      <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:16}}><Btn onClick={onClose}>ביטול</Btn><Btn color="#10b981" onClick={()=>{if(!f.woNumber||!f.qty)return alert('יש למלא מספר פק"ע וכמות');onSave(f)}}>שמור</Btn></div>
    </div>
  );
}

function OrderDetail({order,projects,onClose,onUpdate}){
  const {canEdit}=useAuth();
  const [showDel,setShowDel]=useState(false);
  const [showSh,setShowSh]=useState(false);
  const [showDef,setShowDef]=useState(false);
  const [df,setDf]=useState({qty:"",date:todays(),note:""});
  const [sf,setSf]=useState({item:"",sku:"",missing:"",reason:"",responsible:"",orderedDate:todays(),note:""});
  const [deff,setDeff]=useState({title:"",type:"quality",severity:"medium",description:"",responsible:"",discoveredDate:todays(),status:"open"});
  const [partialModal,setPartialModal]=useState(null);
  const [partialQty,setPartialQty]=useState("");
  const [editShModal,setEditShModal]=useState(null);
  const proj=projects.find(p=>p.id===order.projectId);
  const totalSup=order.deliveries.reduce((a,d)=>a+Number(d.qty||0),0);
  const pct=order.qty?Math.min(100,Math.round(totalSup/Number(order.qty)*100)):0;
  const rev=totalSup*Number(order.unitPrice||0);
  const overdueDays=order.targetDate&&order.status!=="complete"&&new Date(order.targetDate)<new Date()?daysBetween(order.targetDate,todays()):null;
  const lastDel=order.deliveries.map(d=>d.date).filter(Boolean).sort().at(-1);
  const leadTime=order.receivedDate&&order.deliveries.length>0?daysBetween(order.receivedDate,order.deliveries.map(d=>d.date).filter(Boolean).sort()[0]):null;
  const delayFromTarget=order.targetDate&&lastDel?daysBetween(order.targetDate,lastDel):null;
  const upd=(o,action,oid)=>{const u={...o,status:calcStatus(o)};onUpdate(u,action,oid);return u};
  const addDel=()=>{if(!df.qty)return;upd({...order,deliveries:[...order.deliveries,{id:uid(),...df}]},`הוספת אספקה: ${df.qty} יח' בתאריך ${df.date}`,order.id);setDf({qty:"",date:todays(),note:""});setShowDel(false)};
  const remDel=id=>{upd({...order,deliveries:order.deliveries.filter(del=>del.id!==id)},`מחיקת אספקה`,order.id)};
  const addSh=()=>{if(!sf.item)return;upd({...order,shortages:[...(order.shortages||[]),{id:uid(),...sf,received:false,receivedDate:null,receivedQty:0}]},`הוספת חוסר: ${sf.item}`,order.id);setSf({item:"",sku:"",missing:"",reason:"",responsible:"",orderedDate:todays(),note:""});setShowSh(false)};
  const saveEditSh=()=>{if(!editShModal)return;upd({...order,shortages:order.shortages.map(s=>s.id===editShModal.id?{...s,...editShModal}:s)},`עריכת חוסר`,order.id);setEditShModal(null)};
  const markRec=id=>{const s=order.shortages.find(sh=>sh.id===id);upd({...order,shortages:order.shortages.map(sh=>sh.id===id?{...sh,received:true,receivedDate:todays(),receivedQty:Number(sh.missing||0)}:sh)},`סימון חוסר כהתקבל: ${s?.item||""}`,order.id)};
  const markRecPartial=(id,qty)=>{upd({...order,shortages:order.shortages.map(sh=>{if(sh.id!==id)return sh;const nq=Number(sh.receivedQty||0)+Number(qty),tot=Number(sh.missing||0);return{...sh,receivedQty:nq,received:tot>0&&nq>=tot,receivedDate:todays()}})},`קבלה חלקית`,order.id);setPartialModal(null);setPartialQty("")};
  const remSh=id=>{upd({...order,shortages:(order.shortages||[]).filter(sh=>sh.id!==id)},`מחיקת חוסר`,order.id)};
  const addDef=()=>{if(!deff.title)return;upd({...order,defects:[...(order.defects||[]),{id:uid(),...deff}]},`הוספת תקלה: ${deff.title}`,order.id);setDeff({title:"",type:"quality",severity:"medium",description:"",responsible:"",discoveredDate:todays(),status:"open"});setShowDef(false)};
  const remDef=id=>{upd({...order,defects:(order.defects||[]).filter(df=>df.id!==id)},`מחיקת תקלה`,order.id)};
  const closeDef=id=>{upd({...order,defects:(order.defects||[]).map(df=>df.id===id?{...df,status:"closed",closedDate:todays()}:df)},`סגירת תקלה`,order.id)};
  const sevColor={low:"#10b981",medium:"#f59e0b",high:"#ef4444",critical:"#dc2626"};
  const typeLabel={quality:"איכות",process:"תהליך",material:"חומר גלם",equipment:"ציוד",human:"גורם אנושי",other:"אחר"};
  return(
    <div>
      <Btn onClick={onClose} style={{marginBottom:12}}>← חזרה</Btn>
      <Card style={{marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12,flexWrap:"wrap",gap:8}}>
          <div><h2 style={{margin:"0 0 3px",color:"#60a5fa"}}>{order.woNumber}</h2><div style={{color:"#94a3b8"}}>{order.description}</div>{proj&&<div style={{marginTop:3,fontSize:13,color:"#93c5fd"}}>📂 {proj.name}</div>}</div>
          <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}><Badge status={order.status} large/>{overdueDays!=null&&<span style={{fontSize:12,background:"#450a0a",color:"#ef4444",padding:"4px 10px",borderRadius:20}}>🚨 {overdueDays} ימים באיחור</span>}</div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(110px,1fr))",gap:8,marginTop:10}}>
          {[["כמות",Number(order.qty||0).toLocaleString()],["סופק",totalSup.toLocaleString()],["יתרה",(Number(order.qty||0)-totalSup).toLocaleString()],["מחיר ליחידה",fmtMoney(order.unitPrice)],["הכנסה ממומשת",fmtMoney(rev)],["תאריך קבלה",fmt(order.receivedDate)],["יעד אספקה",fmt(order.targetDate)],["הזמנה→אספקה",leadTime!=null?leadTime+" ימים":"—"],["עיכוב מהיעד",delayFromTarget!=null?(delayFromTarget>0?"+"+delayFromTarget:delayFromTarget)+" ימים":"—"]].map(([l,v])=>(
            <div key={l} style={{background:"var(--c-deep)",borderRadius:8,padding:"8px 10px"}}><div style={{fontSize:10,color:"#64748b",marginBottom:2}}>{l}</div><div style={{fontWeight:700,fontSize:12,wordBreak:"break-word"}}>{v}</div></div>
          ))}
        </div>
        <div style={{marginTop:12}}><div style={{display:"flex",justifyContent:"space-between",fontSize:13,color:"#94a3b8",marginBottom:3}}><span>התקדמות</span><span>{pct}%</span></div><PBar pct={pct} h={10}/></div>
      </Card>
      <Card style={{marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><h3 style={{margin:0,fontSize:15}}>📦 אספקות</h3>{canEdit&&<Btn color="#3b82f6" onClick={()=>setShowDel(p=>!p)} style={{fontSize:13,padding:"7px 14px"}}>+ הוסף</Btn>}</div>
        {showDel&&(<div style={{background:"var(--c-deep)",borderRadius:8,padding:12,marginBottom:10,display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end"}}><Field label="כמות *" type="number" value={df.qty} onChange={v=>setDf(p=>({...p,qty:v}))}/><Field label="תאריך" type="date" value={df.date} onChange={v=>setDf(p=>({...p,date:v}))}/><Field label="הערה" value={df.note} onChange={v=>setDf(p=>({...p,note:v}))}/><Btn color="#10b981" onClick={addDel}>שמור</Btn><Btn onClick={()=>setShowDel(false)}>ביטול</Btn></div>)}
        {order.deliveries.length===0?<div style={{color:"#64748b",textAlign:"center",padding:16}}>אין אספקות עדיין</div>:(
          <div style={{overflowX:"auto"}}><table><thead><tr><th>תאריך</th><th>כמות</th><th>הכנסה</th><th>הערה</th>{canEdit&&<th></th>}</tr></thead><tbody>{order.deliveries.map(d=>(<tr key={d.id}><td>{fmt(d.date)}</td><td style={{color:"#10b981",fontWeight:700}}>{Number(d.qty).toLocaleString()}</td><td style={{color:"#a78bfa"}}>{fmtMoney(Number(d.qty)*Number(order.unitPrice||0))}</td><td style={{color:"#94a3b8"}}>{d.note||"—"}</td>{canEdit&&<td><IBtn onClick={()=>remDel(d.id)}>🗑️</IBtn></td>}</tr>))}</tbody></table></div>
        )}
      </Card>
      <Card style={{marginBottom:14,border:"1px solid #ef444433"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><h3 style={{margin:0,fontSize:15,color:"#f87171"}}>⚠️ חוסרים בזוודים</h3>{canEdit&&<Btn color="#ef4444" onClick={()=>setShowSh(p=>!p)} style={{fontSize:13,padding:"7px 14px"}}>+ הוסף</Btn>}</div>
        {showSh&&(<div style={{background:"var(--c-deep)",borderRadius:8,padding:12,marginBottom:10,display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end"}}><Field label="תיאור פריט חסר *" value={sf.item} onChange={v=>setSf(p=>({...p,item:v}))} style={{minWidth:180}}/><Field label='מק"ט' value={sf.sku} onChange={v=>setSf(p=>({...p,sku:v}))}/><Field label="כמות" type="number" value={sf.missing} onChange={v=>setSf(p=>({...p,missing:v}))}/><Field label="סיבת חוסר" value={sf.reason} onChange={v=>setSf(p=>({...p,reason:v}))}/><Field label="אחראי" value={sf.responsible} onChange={v=>setSf(p=>({...p,responsible:v}))}/><Field label="תאריך הזמנה" type="date" value={sf.orderedDate} onChange={v=>setSf(p=>({...p,orderedDate:v}))}/><Field label="הערה" value={sf.note} onChange={v=>setSf(p=>({...p,note:v}))}/><Btn color="#ef4444" onClick={addSh}>שמור</Btn><Btn onClick={()=>setShowSh(false)}>ביטול</Btn></div>)}
        {(order.shortages||[]).length===0?<div style={{color:"#64748b",textAlign:"center",padding:16}}>אין חוסרים</div>:(
          <div style={{overflowX:"auto"}}><table><thead><tr><th>פריט</th><th>מק"ט</th><th>כמות</th><th>התקבל</th><th>אחראי</th><th>הוזמן</th><th>סטטוס</th>{canEdit&&<th></th>}</tr></thead><tbody>{order.shortages.map(s=>{const rq=Number(s.receivedQty||0),tot=Number(s.missing||0),isPar=rq>0&&!s.received;return(<tr key={s.id} style={{opacity:s.received?.6:1}}><td style={{fontWeight:600}}>{s.item}</td><td style={{color:"#93c5fd",fontSize:12}}>{s.sku||"—"}</td><td>{tot||"—"}</td><td style={{color:s.received?"#10b981":isPar?"#f59e0b":"#64748b",fontWeight:600}}>{s.received?tot:isPar?`${rq}/${tot}`:"—"}</td><td style={{color:"#a78bfa",fontSize:12}}>{s.responsible||"—"}</td><td>{fmt(s.orderedDate)}</td><td>{s.received?<span style={{color:"#10b981",fontSize:12}}>✅</span>:isPar?<span style={{color:"#f59e0b",fontSize:12}}>📦</span>:<span style={{color:"#ef4444",fontSize:12}}>❌</span>}</td>{canEdit&&<td><div style={{display:"flex",gap:2}}>{!s.received&&<><IBtn onClick={()=>{setPartialModal(s.id);setPartialQty("")}} title="קבלה חלקית">📦</IBtn><IBtn onClick={()=>markRec(s.id)} title="הושלם">✅</IBtn></>}<IBtn onClick={()=>setEditShModal({...s})}>✏️</IBtn><IBtn onClick={()=>remSh(s.id)}>🗑️</IBtn></div></td>}</tr>)})}</tbody></table></div>

      </Card>
      <Card style={{border:"1px solid #f9731633"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><h3 style={{margin:0,fontSize:15,color:"#fb923c"}}>🔧 תקלות בתהליך הייצור</h3>{canEdit&&<Btn color="#f97316" onClick={()=>setShowDef(p=>!p)} style={{fontSize:13,padding:"7px 14px"}}>+ הוסף</Btn>}</div>
        {showDef&&(<div style={{background:"var(--c-deep)",borderRadius:8,padding:12,marginBottom:10,border:"1px solid #f9731633"}}><div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end"}}><Field label="כותרת תקלה *" value={deff.title} onChange={v=>setDeff(p=>({...p,title:v}))} style={{minWidth:180}}/><div style={{display:"flex",flexDirection:"column",gap:4,minWidth:120}}><label style={{fontSize:12,color:"var(--c-dim)",fontWeight:600}}>סוג תקלה</label><select value={deff.type} onChange={e=>setDeff(p=>({...p,type:e.target.value}))}><option value="quality">איכות</option><option value="process">תהליך</option><option value="material">חומר גלם</option><option value="equipment">ציוד</option><option value="human">גורם אנושי</option><option value="other">אחר</option></select></div><div style={{display:"flex",flexDirection:"column",gap:4,minWidth:110}}><label style={{fontSize:12,color:"var(--c-dim)",fontWeight:600}}>חומרה</label><select value={deff.severity} onChange={e=>setDeff(p=>({...p,severity:e.target.value}))}><option value="low">נמוכה</option><option value="medium">בינונית</option><option value="high">גבוהה</option><option value="critical">קריטית</option></select></div><Field label="אחראי" value={deff.responsible} onChange={v=>setDeff(p=>({...p,responsible:v}))}/><Field label="תאריך גילוי" type="date" value={deff.discoveredDate} onChange={v=>setDeff(p=>({...p,discoveredDate:v}))}/><Field label="תיאור" value={deff.description} onChange={v=>setDeff(p=>({...p,description:v}))} style={{minWidth:200}}/><Btn color="#f97316" onClick={addDef}>שמור</Btn><Btn onClick={()=>setShowDef(false)}>ביטול</Btn></div></div>)}
        {(order.defects||[]).length===0?<div style={{color:"#64748b",textAlign:"center",padding:16}}>אין תקלות רשומות</div>:(
          <div style={{display:"flex",flexDirection:"column",gap:6}}>{(order.defects||[]).map(d=>{const sc=sevColor[d.severity]||"#94a3b8";return(<div key={d.id} style={{background:"var(--c-deep)",borderRadius:8,padding:"10px 14px",border:`1px solid ${d.status==="closed"?"#10b98133":sc+"44"}`,opacity:d.status==="closed"?.65:1}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}><div style={{flex:1}}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}><span style={{fontWeight:700,fontSize:13}}>{d.title}</span><span style={{fontSize:11,background:sc+"22",color:sc,padding:"2px 8px",borderRadius:12,border:`1px solid ${sc}44`}}>{d.severity==="critical"?"🔴 קריטית":d.severity==="high"?"🟠 גבוהה":d.severity==="medium"?"🟡 בינונית":"🟢 נמוכה"}</span><span style={{fontSize:11,background:"var(--c-card)",color:"#93c5fd",padding:"2px 8px",borderRadius:12}}>{typeLabel[d.type]||d.type}</span>{d.status==="closed"&&<span style={{fontSize:11,background:"#052e16",color:"#6ee7b7",padding:"2px 8px",borderRadius:12}}>✅ נסגרה</span>}</div>{d.description&&<div style={{fontSize:12,color:"#94a3b8",marginBottom:3}}>{d.description}</div>}<div style={{fontSize:11,color:"#64748b",display:"flex",gap:10,flexWrap:"wrap"}}>{d.discoveredDate&&<span>גולה: {fmt(d.discoveredDate)}</span>}{d.responsible&&<span style={{color:"#a78bfa"}}>אחראי: {d.responsible}</span>}</div></div>{canEdit&&<div style={{display:"flex",gap:4}}>{d.status!=="closed"&&<IBtn onClick={()=>closeDef(d.id)} title="סגור תקלה">✅</IBtn>}<IBtn onClick={()=>remDef(d.id)}>🗑️</IBtn></div>}</div></div>)})}</div>
        )}
      </Card>
    </div>
  );
}

let saveTimer=null;
function App(){
  const [lightMode,setLightMode]=useState(()=>{try{return localStorage.getItem("pmo_light")==="1"}catch{return false}});
  const [currentUser,setCurrentUser]=useState(()=>{
    try{const saved=localStorage.getItem("pmo_session");if(saved){const s=JSON.parse(saved);const cached=JSON.parse(localStorage.getItem("pmo_users")||"[]");const found=cached.find(u=>u.id===s.id&&u.username===s.username&&u.active!==false);if(found)return found;localStorage.removeItem("pmo_session")}return null}catch{return null}
  });
  const [tab,setTab]=useState("dashboard");
  const [showAdmin,setShowAdmin]=useState(false);
  const [showCustomize,setShowCustomize]=useState(false);
  const [orders,setOrders]=useState([]);
  const [projects,setProjects]=useState(DEF_PROJ);
  const [loading,setLoading]=useState(true);
  const [sync,setSync]=useState("ok");
  // PWA state
  const [installPrompt,setInstallPrompt]=useState(null);
  const [showInstallBanner,setShowInstallBanner]=useState(false);
  const [showUpdateBanner,setShowUpdateBanner]=useState(false);
  const swRegRef=useRef(null);
  const oRef=useRef(orders),pRef=useRef(projects);

  useEffect(()=>{
    document.body.classList.toggle("light-mode",lightMode);
    try{localStorage.setItem("pmo_light",lightMode?"1":"0")}catch{};
    const m=document.getElementById("tcm");
    if(m)m.content=lightMode?"#ffffff":"#0f1117";
  },[lightMode]);

  // ── PWA Install prompt ──────────────────────────────────────────────────
  useEffect(()=>{
    // Check if already running as installed PWA
    const isInstalled=window.matchMedia("(display-mode: standalone)").matches
      || window.navigator.standalone===true;
    if(isInstalled) return; // already installed — never show banner

    const handler=e=>{
      e.preventDefault(); // stop Chrome mini-infobar
      setInstallPrompt(e);
      setShowInstallBanner(true); // always show — until user installs
    };
    window.addEventListener("beforeinstallprompt",handler);

    // Hide permanently only after actual installation
    window.addEventListener("appinstalled",()=>{
      setShowInstallBanner(false);
      setInstallPrompt(null);
    });

    return()=>window.removeEventListener("beforeinstallprompt",handler);
  },[]);

  // ── Service Worker registration + update detection ──
  useEffect(()=>{
    if(!("serviceWorker" in navigator)) return;
    navigator.serviceWorker.register("./sw.js?v=4").then(reg=>{
      swRegRef.current=reg;
      if(reg.waiting) setShowUpdateBanner(true);
      reg.addEventListener("updatefound",()=>{
        const nw=reg.installing;
        if(!nw) return;
        nw.addEventListener("statechange",()=>{
          if(nw.state==="installed"&&navigator.serviceWorker.controller){
            setShowUpdateBanner(true);
          }
        });
      });
      const poll=setInterval(()=>reg.update(),30*60*1000);
      return()=>clearInterval(poll);
    }).catch(()=>{});
    navigator.serviceWorker.addEventListener("controllerchange",()=>{
      window.location.reload();
    });
  },[]);

  const handleInstall=async()=>{
    if(!installPrompt) return;
    installPrompt.prompt();
    const res=await installPrompt.userChoice;
    setInstallPrompt(null);
    setShowInstallBanner(false);
    // No localStorage save — if they cancel, banner shows again next visit
  };
  const handleDismissInstall=()=>{
    // Just hide for this session — will reappear next visit
    setShowInstallBanner(false);
  };
  const handleUpdate=()=>{
    const reg=swRegRef.current;
    if(reg&&reg.waiting) reg.waiting.postMessage({type:"SKIP_WAITING"});
    else window.location.reload();
    setShowUpdateBanner(false);
  };

  useEffect(()=>{
    const lo=LS.get("pmo_orders"),lp=LS.get("pmo_projects");
    if(lo)setOrders(lo);if(lp)setProjects(lp);
    Promise.all([gsLoad(),gsLoadUsers()]).then(([data,users])=>{
      if(data){setOrders(data.orders||[]);setProjects(data.projects||DEF_PROJ);LS.set("pmo_orders",data.orders||[]);LS.set("pmo_projects",data.projects||DEF_PROJ)}
      const freshUsers=users||(LS.get("pmo_users")||FALLBACK_USERS);
      if(users)LS.set("pmo_users",users);
      try{const saved=localStorage.getItem("pmo_session");if(saved){const s=JSON.parse(saved);const found=freshUsers.find(u=>u.id===s.id&&u.username===s.username&&u.active!==false);if(found)setCurrentUser(found);else localStorage.removeItem("pmo_session")}}catch{}
      setLoading(false);
    });
  },[]);

  useEffect(()=>{oRef.current=orders},[orders]);
  useEffect(()=>{pRef.current=projects},[projects]);

  const persist=(no,np)=>{const o=no??oRef.current,p=np??pRef.current;LS.set("pmo_orders",o);LS.set("pmo_projects",p);setSync("saving");clearTimeout(saveTimer);saveTimer=setTimeout(async()=>{try{await fetch(GS_URL,{method:"POST",body:JSON.stringify({action:"save",payload:{orders:o,projects:p}})});setSync("ok")}catch{setSync("error")}},800)};

  const handleLogin=u=>{setCurrentUser(u);try{localStorage.setItem("pmo_session",JSON.stringify({id:u.id,username:u.username}))}catch{}};
  const handleLogout=()=>{if(currentUser)addAuditEntry({userId:currentUser.id,username:currentUser.username,name:currentUser.name,action:"התנתקות מהמערכת",target:"",details:""});setCurrentUser(null);try{localStorage.removeItem("pmo_session")}catch{}};

  const canEdit=currentUser?.role==="admin"||currentUser?.canEdit===true;
  const canViewProject=pid=>{if(!currentUser)return false;if(currentUser.role==="admin")return true;const pa=currentUser.projectAccess;if(pa==="all")return true;if(Array.isArray(pa))return pa.includes(pid);return pa===pid};
  const filteredProjects=projects.filter(p=>canViewProject(p.id));
  const filteredOrders=orders.filter(o=>canViewProject(o.projectId));

  const updO=useCallback((fn,action,details,orderId)=>{setOrders(prev=>{const next=fn(prev);persist(next,null);if(currentUser&&action){const before=orderId?prev.find(o=>o.id===orderId):null;const after=orderId?next.find(o=>o.id===orderId):null;addAuditEntry({userId:currentUser.id,username:currentUser.username,name:currentUser.name,action:action||"עדכון",target:orderId||"",details:details||"",snapshot:{before,after},reversible:!!(before&&after)})}return next})},[currentUser]);
  const updP=useCallback((fn,action,details,projectId)=>{setProjects(prev=>{const next=fn(prev);persist(null,next);if(currentUser){const before=projectId?prev.find(p=>p.id===projectId):null;const after=projectId?next.find(p=>p.id===projectId):null;addAuditEntry({userId:currentUser.id,username:currentUser.username,name:currentUser.name,action:action||"עדכון פרויקטים",target:projectId||"",details:details||"",snapshot:{before,after,prevList:prev,nextList:next},reversible:true,entityType:"project"})}return next})},[currentUser]);

  if(!currentUser)return(<AuthCtx.Provider value={{currentUser,canEdit,canViewProject}}><LoginScreen onLogin={handleLogin} lightMode={lightMode} toggleLight={()=>setLightMode(p=>!p)}/></AuthCtx.Provider>);
  if(loading)return(<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",gap:16}}><div style={{fontSize:48}}>🏭</div><div style={{color:"#60a5fa",fontSize:20,fontWeight:700}}>טוען...</div></div>);

  const lm=lightMode;
  return(
    <AuthCtx.Provider value={{currentUser,canEdit,canViewProject}}>
      {showUpdateBanner&&<UpdateBanner onUpdate={handleUpdate} onDismiss={()=>setShowUpdateBanner(false)} lightMode={lm}/>}
      <Navbar tab={tab} setTab={setTab} lightMode={lm} toggleLight={()=>setLightMode(p=>!p)} sync={sync} onAdmin={()=>setShowAdmin(true)} onCustomize={()=>setShowCustomize(true)} onLogout={handleLogout}/>
      <main className="main-content" style={{maxWidth:1440,margin:"0 auto",padding:"16px 14px",paddingBottom:showInstallBanner?"100px":"calc(16px + env(safe-area-inset-bottom,0px))"}}>
        {tab==="dashboard"&&<Dashboard orders={filteredOrders} projects={filteredProjects} lightMode={lm}/>}
        {tab==="orders"&&<Orders orders={filteredOrders} projects={filteredProjects} updO={updO}/>}
        {tab==="shortages"&&<Shortages orders={filteredOrders} updO={updO} projects={filteredProjects}/>}
        {tab==="defects"&&<DefectsDashboard orders={filteredOrders} projects={filteredProjects} updO={updO}/>}
        {tab==="yield"&&<YieldDashboard orders={filteredOrders} projects={filteredProjects}/>}
        {tab==="projects"&&<Projects projects={filteredProjects} orders={filteredOrders} updP={updP}/>}
        {tab==="excel"&&<ExcelTab orders={filteredOrders} projects={filteredProjects} updO={updO}/>}
      </main>
      {showInstallBanner&&<InstallBanner onInstall={handleInstall} onDismiss={handleDismissInstall} lightMode={lm}/>}
      {showAdmin&&<AdminPanel projects={projects} onClose={()=>setShowAdmin(false)} lightMode={lm} orders={orders} setOrders={setOrders} setProjects={setProjects} persist={persist}/>}
      {showCustomize&&<CustomizePanel onClose={()=>setShowCustomize(false)}/>}
    </AuthCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
